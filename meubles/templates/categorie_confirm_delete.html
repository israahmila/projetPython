{% extends 'base.html' %}
{% block content %}
<div class="text-center mt-5">
    <h2 class="mb-4 fw-light">Action Requise</h2>
    <p class="lead text-muted mb-5">La suppression de cet enregistrement ({% if categorie %}{{ categorie.nom }}{% else %}{{ fournisseur.nom }}{% endif %}) est permanente et aura des répercussions sur les éléments liés.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-3">
           <a href="javascript:history.back()" class="btn btn-outline-bronze px-4 py-2">ANNULER</a>
           <button type="submit" class="btn btn-primary-bronze px-4 py-2 border-0" style="background-color: #222;">CONFIRM REMOVAL</button>
        </div>
    </form>
</div>
{% endblock %}
