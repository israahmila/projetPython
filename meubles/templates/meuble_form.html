{% extends 'base.html' %}
{% block content %}
<style>
    .form-container { max-width: 700px; margin: 0 auto; }
    .clean-input { border: none; border-bottom: 1px solid #ddd; border-radius: 0; padding: 12px 0; background: transparent; transition: 0.3s; box-shadow: none !important; font-family: 'Jost', sans-serif;}
    .clean-input:focus { border-bottom-color: var(--primary-color); }
    .form-label { font-weight: 500; color: #444; margin-top: 15px; font-size:0.9rem;}
    .form-title { font-weight: 400; font-size: 2.2rem; margin-bottom: 2rem; text-align: center; }
</style>
<div class="form-container">
    <h2 class="form-title">{% if form.instance.pk %}Modifier le meuble{% else %}Créer un nouveau meuble{% endif %}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row">
            {% for field in form %}
            <div class="col-md-{% if field.name in 'description,image,categorie,fournisseur' %}12{% else %}6{% endif %} mb-3">
                <label class="form-label text-uppercase">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                <div class="text-danger small mt-1">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}
        </div>
        <div class="d-flex justify-content-center gap-3 mt-5">
            <a href="javascript:history.back()" class="btn btn-outline-bronze px-5 py-2">ANNULER</a>
            <button type="submit" class="btn btn-primary-bronze px-5 py-2">ENREGISTRER</button>
        </div>
    </form>
</div>
<script>
    document.querySelectorAll('input, select, textarea').forEach(el => {
        if(el.type !== 'file' && el.type !== 'checkbox') {
            el.classList.add('form-control', 'clean-input');
        } else if (el.type === 'file') {
            el.classList.add('form-control');
        } else if (el.type === 'checkbox') {
            el.classList.add('form-check-input');
            el.style.marginLeft = "10px";
            el.style.cursor = "pointer";
        }
    });
</script>
{% endblock %}
